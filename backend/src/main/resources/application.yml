server:
  port: 8080

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: ai4note-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai4note}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

ai4note:
  storage-root: ${AI4NOTE_STORAGE_ROOT:../storage}
  ai:
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      default-model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
